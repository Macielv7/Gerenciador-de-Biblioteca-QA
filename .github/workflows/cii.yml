name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código (fetch-depth: 0 necessário para o SonarQube analisar histórico)
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configura o Java 21
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Roda os testes e gera relatório de cobertura JaCoCo
      #    ubuntu-latest tem Docker instalado nativamente, então Testcontainers funciona
      - name: Rodar testes com cobertura
        run: |
          chmod +x mvnw
          ./mvnw clean verify

      # 4. Análise de qualidade com SonarCloud
      #    Requer o secret SONAR_TOKEN configurado no repositório GitHub.
      #    A organização e o host já estão definidos no pom.xml (sonar.organization, sonar.host.url).
      - name: Análise SonarCloud
        if: ${{ secrets.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw sonar:sonar -Dsonar.projectKey=macielv7_Gerenciador-de-Biblioteca-QA

      # 5. Publica o relatório de cobertura como artifact do workflow
      - name: Publicar relatório de cobertura (JaCoCo)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
