spring.application.name=biblioteca

# MongoDB - Configuração local (use docker-compose.yml para subir o banco em dev)
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=biblioteca

# Thymeleaf - Desativa cache em desenvolvimento (recarrega templates automaticamente)
spring.thymeleaf.cache=false

# Logging
logging.level.com.example.projeto=DEBUG
