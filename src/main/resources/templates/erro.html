<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' - Sistema de Livros'">Erro - Sistema de Livros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-container {
            max-width: 500px;
            margin: 6rem auto;
            text-align: center;
        }
        .error-code {
            font-size: 5rem;
            font-weight: bold;
            color: #dc3545;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container">
        <div class="error-container">
            <div class="error-code" th:text="${status}">500</div>
            <h2 class="mb-3" th:text="${titulo}">Erro</h2>
            <p class="text-muted" th:text="${mensagem}">Ocorreu um erro inesperado.</p>
            <a href="/livros" class="btn btn-primary mt-3">Voltar para a lista de livros</a>
        </div>
    </div>
</body>
</html>
