<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Novo Livro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/livros">
                <i class="fas fa-book"></i> Sistema de Livros
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">
                    Olá, <span th:text="${#authentication.name}"></span>!
                </span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0" th:text="${titulo}">Novo Livro</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/livros}" method="post" th:object="${livro}">
                            <input type="hidden" th:field="*{id}">

                            <div class="row mb-3">
                                <div class="col-md-8">
                                    <label for="titulo" class="form-label">Título *</label>
                                    <input type="text" class="form-control" id="titulo" th:field="*{titulo}" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="isbn" class="form-label">ISBN</label>
                                    <input type="text" class="form-control" id="isbn" th:field="*{isbn}"
                                           placeholder="978-3-16-148410-0">
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="autor" class="form-label">Autor *</label>
                                    <input type="text" class="form-control" id="autor" th:field="*{autor}" required>
                                </div>
                                <div class="col-md-3">
                                    <label for="ano" class="form-label">Ano</label>
                                    <input type="number" class="form-control" id="ano" th:field="*{ano}"
                                           min="1000" max="2030" placeholder="2024">
                                </div>
                                <div class="col-md-3">
                                    <label for="genero" class="form-label">Gênero</label>
                                    <select class="form-control" id="genero" th:field="*{genero}">
                                        <option value="">Selecione...</option>
                                        <option value="Ficção">Ficção</option>
                                        <option value="Não-ficção">Não-ficção</option>
                                        <option value="Romance">Romance</option>
                                        <option value="Fantasia">Fantasia</option>
                                        <option value="Ficção Científica">Ficção Científica</option>
                                        <option value="Mistério">Mistério</option>
                                        <option value="Terror">Terror</option>
                                        <option value="Biografia">Biografia</option>
                                        <option value="História">História</option>
                                        <option value="Autoajuda">Autoajuda</option>
                                        <option value="Técnico">Técnico</option>
                                        <option value="Outro">Outro</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="editora" class="form-label">Editora</label>
                                <input type="text" class="form-control" id="editora" th:field="*{editora}">
                            </div>

                            <div class="mb-3">
                                <label for="urlCapa" class="form-label">URL da Capa</label>
                                <input type="url" class="form-control" id="urlCapa" th:field="*{urlCapa}"
                                       placeholder="https://exemplo.com/capa.jpg">
                                <div class="form-text">URL de uma imagem da capa do livro (opcional)</div>
                            </div>

                            <div class="mb-3">
                                <label for="descricao" class="form-label">Descrição</label>
                                <textarea class="form-control" id="descricao" th:field="*{descricao}"
                                          rows="4" placeholder="Descrição do livro..."></textarea>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/livros" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left"></i> Voltar
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> Salvar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
